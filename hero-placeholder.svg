<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hero image placeholder</title>
  <desc id="desc">Replace this file with your own hero image. Keep the same filename to avoid editing HTML.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081827" />
      <stop offset="0.55" stop-color="#07080b" />
      <stop offset="1" stop-color="#1b1206" />
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="22%" r="65%">
      <stop offset="0" stop-color="#f5a431" stop-opacity="0.45" />
      <stop offset="1" stop-color="#f5a431" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="84" height="84" patternUnits="userSpaceOnUse">
      <path d="M84 0H0V84" fill="none" stroke="rgba(247,240,227,0.08)" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#glow)" />
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.8" />

  <g fill="none" stroke="rgba(247,240,227,0.22)" stroke-width="2">
    <rect x="90" y="90" width="1420" height="720" rx="34" />
  </g>

  <g font-family="Arial, Helvetica, sans-serif" fill="#f7f0e3">
    <text x="120" y="220" font-size="56" font-weight="700">Hero Image Placeholder</text>
    <text x="120" y="290" font-size="26" fill="rgba(247,240,227,0.82)">Replace: hero-placeholder.svg</text>
    <text x="120" y="330" font-size="22" fill="rgba(247,240,227,0.72)">Tip: keep a wide image (16:9-ish) for best results.</text>

    <g transform="translate(120 410)" fill="none" stroke="rgba(245,164,49,0.65)" stroke-width="2">
      <rect width="520" height="70" rx="14" />
    </g>
    <text x="150" y="456" font-size="22" font-weight="700" fill="#17100b">Swap image, keep filename</text>
  </g>
</svg>
