<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Gallery placeholder 1</title>
  <desc id="desc">Replace this file with your own photo. Keep the same filename to avoid editing HTML.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07080b" />
      <stop offset="0.58" stop-color="#0f141d" />
      <stop offset="1" stop-color="#201505" />
    </linearGradient>
    <radialGradient id="glow" cx="82%" cy="18%" r="65%">
      <stop offset="0" stop-color="#f5a431" stop-opacity="0.28" />
      <stop offset="1" stop-color="#f5a431" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)" />
  <rect width="1400" height="900" fill="url(#glow)" />

  <g fill="none" stroke="rgba(247,240,227,0.18)" stroke-width="2">
    <rect x="70" y="70" width="1260" height="760" rx="34" />
  </g>

  <g font-family="Arial, Helvetica, sans-serif" fill="#f7f0e3">
    <text x="110" y="210" font-size="54" font-weight="700">Gallery Image 1</text>
    <text x="110" y="280" font-size="24" fill="rgba(247,240,227,0.78)">Replace: gallery-1.svg</text>
  </g>
</svg>
